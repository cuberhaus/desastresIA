version: 2

updates:
  - package-ecosystem: npm
    directory: /web/frontend
    schedule:
      interval: weekly
      day: monday
    groups:
      npm:
        patterns: ['*']
    commit-message:
      prefix: chore(deps)
      include: scope
    labels:
      - dependencies

  - package-ecosystem: pip
    directories:
      - /python_scripts
      - /web
    schedule:
      interval: weekly
      day: monday
    groups:
      pip:
        patterns: ['*']
    commit-message:
      prefix: chore(deps)
      include: scope
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      docker:
        patterns: ['*']
    commit-message:
      prefix: chore(docker)
      include: scope
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ['*']
    commit-message:
      prefix: chore(ci)
      include: scope
    labels:
      - dependencies
      - ci
