# Weekly Dependabot scans against main. Existing test.yml CI gates each
# PR. Major-version bumps ignored — those need focused review.

version: 2
updates:
  - package-ecosystem: pip
    directory: /python_scripts
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: chore(deps)
      include: scope
    labels:
      - dependencies

  - package-ecosystem: pip
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: chore(deps)
      include: scope
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /web/frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: chore(deps)
      include: scope
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(ci)
      include: scope
    labels:
      - dependencies
      - ci
