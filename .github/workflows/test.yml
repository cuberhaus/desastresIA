name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: web/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx2

      - name: Run tests
        run: python -m pytest backend/test_app.py -v
